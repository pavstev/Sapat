name: Set up build
description: Select Xcode 16+ and restore the SwiftPM cache. Shared by the CI and Release workflows so the toolchain pin and cache key stay in sync.

runs:
  using: composite
  steps:
    # WhisperKit 1.0.0 requires Xcode 16+ / macOS 15 SDK (uses MLState, @retroactive).
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache SwiftPM
      uses: actions/cache@v4
      with:
        path: |
          .build
          ~/Library/Caches/org.swift.swiftpm
        key: spm-${{ github.event.repository.name }}-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
        restore-keys: |
          spm-${{ github.event.repository.name }}-${{ runner.os }}-
