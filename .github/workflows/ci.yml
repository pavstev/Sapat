name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Test
        run: swift test

      - name: Build and bundle
        run: ./bundle.sh

      - name: Verify bundle
        run: |
          codesign --verify --verbose=2 Sapat.app
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" Sapat.app/Contents/Info.plist
