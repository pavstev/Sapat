name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build

      - name: Toolchain
        run: swift --version && xcodebuild -version

      # Fast PR checks: run the suite and compile the engine-agnostic layers via SwiftPM. The
      # MLX engine (gated by `#if canImport(MLXLLM)`) is built + validated by the release
      # workflow's xcodebuild and by a local `./bundle.sh` — it needs the heavy Metal toolchain,
      # which we don't pay on every push.
      - name: Test
        run: swift test

      - name: Build (engine-agnostic layers)
        run: swift build -c release
